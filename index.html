<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;family=Geist:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="src/styles.css" />
    <title>GlobalCast</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form id="search-form">
          <input
            class="search-input"
            id="search-input"
            type="search"
            autofocus="on"
            placeholder="Search for a city..."
          />
          <input class="search-button" type="submit" value="Search" />
          <p class="search-error" id="search-error"></p>
        </form>
      </header>
      <main>
        <div class="current-weather">
          <div>
            <h1 class="current-city" id="current-city"></h1>
            <p class="current-details">
              <span id="time"></span> <span id="description"></span>  <br /> <br />
              Humidity: <strong id="humidity"></strong>&nbsp;&nbsp;  Wind: <strong id="wind-speed"></strong>
            </p>
          </div>
          <div class="current-temperature">
            <span class="current-temperature-icon" id="current-temperature-icon"></span
            ><span class="current-temperature-value" id="current-temperature"></span
            ><span class="current-temperature-unit">°C</span>
          </div>
        </div>
        <div class="weather-forecast" id="forecast"></div>

      </main>
      <footer>
      </footer>
    </div>
  </body>
  <script src="src/index.js"></script>
</html>
